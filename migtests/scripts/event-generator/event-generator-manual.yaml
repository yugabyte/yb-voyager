connection:
  host: 127.0.0.1
  port: 5432
  database: iter_manual
  user: postgres
  password: postgres

generator:
  schema_name: public
  manual_table_list: []
  exclude_table_list: [cutover_table, identity_test, tsvector_table]
  num_iterations: -1
  wait_after_operations: 1000
  wait_duration_seconds: 1
  table_weights: {}
  operation_weights: {INSERT: 3, UPDATE: 2, DELETE: 1}
  random_seed: 123
  faker_seed: 123
  insert_rows: 1
  update_rows: 1
  delete_rows: 1
  insert_max_retries: 50
  update_max_retries: 1
